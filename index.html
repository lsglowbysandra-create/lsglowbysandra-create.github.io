<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LS Glow by Sandra - Boutique</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f7f7f7;
}

/* HEADER */
header {
    background: #000;
    color: white;
    padding: 15px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 22px;
}

/* BOUTIQUE GRID */
.shop {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
}

/* PRODUIT STYLE COMMERCIAL */
.product {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.product img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

/* TEXT */
.product h4 {
    margin: 10px;
    font-size: 14px;
}

.price {
    margin: 0 10px;
    font-weight: bold;
    color: #e60023;
}

/* BOUTON ACHAT (IMPORTANT) */
.buy-btn {
    display: block;
    margin: 10px;
    padding: 10px;
    text-align: center;
    background: #e60023;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
}

/* TOP BAR */
.top {
    background: #fff;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

</style>

</head>

<body>

<header>
    <h1>LS GLOW BY SANDRA 💅</h1>
</header>

<div class="top">
    Press On Nails faits main - 10€ 💖
</div>

<!-- 🛍️ BOUTIQUE -->
<div class="shop">

    <!-- PRODUIT 1 -->
    <div class="product">
        <img src="pressonnail1.jpg">
        <h4>Luxury Nude</h4>
        <p class="price">10 €</p>
        <a class="buy-btn" href="https://paypal.me/SandraLefevre488" target="_blank">
            ACHETER
        </a>
    </div>

    <!-- PRODUIT 2 -->
    <div class="product">
        <img src="pressonnail2.jpg">
        <h4>French Glam</h4>
        <p class="price">10 €</p>
        <a class="buy-btn" href="https://paypal.me/SandraLefevre488" target="_blank">
            ACHETER
        </a>
    </div>

</div>

</body>
</html>
