<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LS Glow by Sandra</title>

<style>

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: url("marbre.jpeg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

.overlay {
    min-height: 100vh;
    padding: 30px 10px;
}

.logo {
    width: 140px;
    height: 140px;
    object-fit: cover;
    border-radius: 10px;
    border: 2px solid #d4af37;
}

h1 { color: #d4af37; }
h2 { color: #000; font-weight: normal; }

nav {
    position: sticky;
    top: 0;
    background: rgba(245, 230, 200, 0.95);
    padding: 10px;
    z-index: 1000;
}

nav a {
    margin: 0 10px;
    color: #d4af37;
    text-decoration: none;
    font-weight: bold;
}

.card {
    max-width: 750px;
    margin: 20px auto;
    padding: 20px;
    background: rgba(245, 230, 200, 0.92);
    border-radius: 15px;
}

/* BOUTIQUE */
.shop {
    display: flex;
    flex-direction: column;
    gap: 25px;
}

.product {
    background: rgba(255,255,255,0.7);
    padding: 15px;
    border-radius: 12px;
}

/* 2 PHOTOS CÔTE À CÔTE */
.images {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
}

.images img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 10px;
}

.price {
    font-size: 18px;
    font-weight: bold;
    color: #d4af37;
}

.paypal-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background: #0070ba;
    color: white;
    border-radius: 20px;
    text-decoration: none;
}

</style>
</head>

<body>

<div class="overlay">

<header>
    <img src="logo.jpeg" class="logo">
    <h1>LS GLOW BY SANDRA</h1>
    <h2>Press On Nails 💅</h2>
</header>

<nav>
    <a href="#boutique">Boutique</a>
    <a href="#contact">Contact</a>
</nav>

<!-- BOUTIQUE -->
<section id="boutique" class="card">

    <h3>Boutique Press On Nails 💅</h3>

    <div class="shop">

        <!-- PRODUIT 1 -->
        <div class="product">

            <div class="images">
                <img src="nail1a.jpg">
                <img src="nail1b.jpg">
            </div>

            <h4>Modèle 1</h4>
            <p class="price">10 €</p>

            <a class="paypal-btn" href="https://paypal.me/SandraLefevre488" target="_blank">
                Payer avec PayPal
            </a>

        </div>

        <!-- PRODUIT 2 -->
        <div class="product">

            <div class="images">
                <img src="nail2a.jpg">
                <img src="nail2b.jpg">
            </div>

            <h4>Modèle 2</h4>
            <p class="price">10 €</p>

            <a class="paypal-btn" href="https://paypal.me/SandraLefevre488" target="_blank">
                Payer avec PayPal
            </a>

        </div>

    </div>

</section>

<!-- CONTACT -->
<section id="contact" class="card">

    <h3>Contact</h3>

    <p>📞 06.31.22.09.52</p>
    <p>📧 ls.glow.by.sandra@gmail.com</p>

</section>

</div>

</body>
</html>
